<!DOCTYPE html>
<html>
<head>
    <title>Generador de CV - Tu Plataforma de Empleo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="max-w-4xl mx-auto p-8">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent mb-4">
                📄 Generador de CV
            </h1>
            <p class="text-xl text-gray-600">Rellena tus datos y descarga tu CV en PDF optimizado para ATS</p>
        </div>

        <form action="/generar-cv" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-8 bg-white p-8 rounded-2xl shadow-2xl">
            
            <!-- Datos Personales -->
            <div class="md:col-span-2">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">👤 Datos Personales</h2>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Nombre Completo *</label>
                <input type="text" name="nombre" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email *</label>
                <input type="email" name="email" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Teléfono</label>
                <input type="tel" name="telefono" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">LinkedIn</label>
                <input type="url" name="linkedin" placeholder="https://linkedin.com/in/tu-perfil" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Experiencia Laboral -->
            <div class="md:col-span-2">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">💼 Experiencia Laboral</h2>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Puesto Actual *</label>
                <input type="text" name="puesto_actual" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Empresa Actual *</label>
                <input type="text" name="empresa_actual" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-2">Experiencias Previas (separadas por comas)</label>
                <textarea name="experiencias" rows="3" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <!-- Habilidades -->
            <div class="md:col-span-2">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">🛠️ Habilidades & Educación</h2>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Habilidades Técnicas (separadas por comas)</label>
                <input type="text" name="habilidades" placeholder="Python, JavaScript, SQL, FastAPI..." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Educación</label>
                <input type="text" name="educacion" placeholder="Grado en Ingeniería Informática - Universidad..." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="md:col-span-2">
                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-4 px-8 rounded-xl text-lg hover:from-blue-700 hover:to-purple-700 transition-all duration-300 shadow-lg">
                    🚀 Generar y Descargar mi CV
                </button>
            </div>
        </form>

        <div class="text-center mt-8">
            <a href="/" class="text-blue-600 hover:text-blue-800 font-semibold">← Volver al Mapa de Ofertas</a>
        </div>
    </div>
</body>
</html>
