version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: inclusivjob_db
    restart: always
    environment:
      MYSQL_DATABASE: inclusivjob
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  ollama:
    image: ollama/ollama:latest
    container_name: inclusivjob_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  web:
    build: .
    container_name: inclusivjob_app
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
      - ollama
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=mysql+pymysql://root@db/inclusivjob

volumes:
  db_data:
  ollama_data: