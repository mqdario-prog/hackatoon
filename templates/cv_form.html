<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de CV Profesional - InclusivJob</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-100 min-h-screen py-12">
    <div class="max-w-5xl mx-auto px-4">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-blue-900 mb-2">📄 Generador de CV Ejecutivo</h1>
            <p class="text-gray-600">Crea un currículum optimizado para empresas inclusivas y sistemas ATS</p>
        </div>

        <form action="/generar-cv" method="POST" class="bg-white shadow-2xl rounded-3xl overflow-hidden">
            <div class="p-8 md:p-12 space-y-10">
                
                <!-- SECCIÓN: DATOS PERSONALES Y DISCAPACIDAD -->
                <section>
                    <h2 class="text-2xl font-bold text-blue-800 mb-6 border-b-2 border-blue-100 pb-2">👤 Información Personal</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre Completo *</label>
                            <input type="text" name="nombre" required class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Certificado Discapacidad</label>
                            <select name="certificado_discapacidad" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="Sí (>33%)">Sí (Igual o superior al 33%)</option>
                                <option value="Sí (IPT)">Sí (Incapacidad Permanente)</option>
                                <option value="No">No poseo certificado</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Email *</label>
                            <input type="email" name="email" required class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Teléfono</label>
                            <input type="tel" name="telefono" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Ubicación (Ciudad/Provincia)</label>
                            <input type="text" name="ciudad" placeholder="Ej: Madrid, España" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl">
                        </div>
                    </div>
                </section>

                <!-- SECCIÓN: PERFIL PROFESIONAL -->
                <section>
                    <h2 class="text-2xl font-bold text-blue-800 mb-6 border-b-2 border-blue-100 pb-2">🎯 Perfil Profesional</h2>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Breve resumen de tu trayectoria y objetivos (Máx. 3-4 líneas)</label>
                    <textarea name="perfil" rows="3" placeholder="Profesional con X años de experiencia en... especializado en... Busco aportar mis conocimientos en..." class="w-full p-4 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </section>

                <!-- SECCIÓN: EXPERIENCIA -->
                <section>
                    <h2 class="text-2xl font-bold text-blue-800 mb-6 border-b-2 border-blue-100 pb-2">💼 Experiencia y Formación</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Puesto Actual o Último *</label>
                            <input type="text" name="puesto_actual" required placeholder="Ej: Administrativo Contable" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Empresa *</label>
                            <input type="text" name="empresa_actual" required class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl">
                        </div>
                    </div>
                    <div class="space-y-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Otras Experiencias Destacadas (separadas por comas)</label>
                        <textarea name="experiencias" rows="3" placeholder="Puesto en Empresa (Fecha), Puesto en Empresa (Fecha)..." class="w-full p-4 bg-gray-50 border border-gray-300 rounded-xl"></textarea>
                        
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Educación y Títulos</label>
                        <input type="text" name="educacion" placeholder="Ej: Grado en ADE, Máster en RRHH..." class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl">
                    </div>
                </section>

                <!-- SECCIÓN: SKILLS E IDIOMAS -->
                <section>
                    <h2 class="text-2xl font-bold text-blue-800 mb-6 border-b-2 border-blue-100 pb-2">🛠️ Habilidades e Idiomas</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Habilidades (separadas por comas)</label>
                            <input type="text" name="habilidades" placeholder="Python, Gestión de equipos, SAP..." class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Idiomas</label>
                            <input type="text" name="idiomas" placeholder="Inglés (C1), Francés (B2)..." class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl">
                        </div>
                    </div>
                </section>
            </div>

            <!-- Botón de Envío -->
            <div class="bg-gray-50 p-8 text-center border-t">
                <button type="submit" class="bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 px-12 rounded-2xl text-xl shadow-xl transition-all transform hover:scale-105">
                    🚀 Generar y Descargar CV Profesional
                </button>
                <p class="text-xs text-gray-400 mt-4">Al hacer clic, se generará un documento PDF de alta calidad.</p>
            </div>
        </form>

        <div class="text-center mt-8">
            <a href="/" class="text-blue-700 font-bold hover:underline">← Volver al buscador de empleo</a>
        </div>
    </div>
</body>
</html>
