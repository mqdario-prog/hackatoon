<!-- Filtros SVG para Daltonismo (Ocultos pero necesarios en cada página) -->
<svg style="display: none">
    <defs>
      <filter id="protanopia"><feColorMatrix type="matrix" values="0.567, 0.433, 0, 0, 0  0.558, 0.442, 0, 0, 0  0, 0.242, 0.758, 0, 0  0, 0, 0, 1, 0"/></filter>
      <filter id="deuteranopia"><feColorMatrix type="matrix" values="0.625, 0.375, 0, 0, 0  0.7, 0.3, 0, 0, 0  0, 0.3, 0.7, 0, 0  0, 0, 0, 1, 0"/></filter>
      <filter id="tritanopia"><feColorMatrix type="matrix" values="0.95, 0.05, 0, 0, 0  0, 0.433, 0.567, 0, 0  0, 0.475, 0.525, 0, 0  0, 0, 0, 1, 0"/></filter>
    </defs>
  </svg>
  
  <!-- Barra de Herramientas A11Y -->
  <div class="bg-gray-100 dark:bg-dark-800 border-b border-gray-200 dark:border-dark-700 py-2 px-4 flex flex-wrap justify-end gap-3 dark:text-white text-sm no-print" role="toolbar" aria-label="Herramientas de accesibilidad">
      <select onchange="applyColorFilter(this.value)" class="bg-transparent border border-gray-300 dark:border-dark-600 rounded px-2 py-1 text-xs cursor-pointer hover:border-inclusion-blue text-gray-700 dark:text-gray-300" aria-label="Filtros para daltonismo">
          <option value="">Visión Normal</option>
          <option value="protanopia">Protanopia</option>
          <option value="deuteranopia">Deuteranopia</option>
          <option value="tritanopia">Tritanopia</option>
          <option value="grayscale">Escala de Grises</option>
      </select>
      <div class="w-px bg-gray-300 h-6 mx-1"></div>
      <button onclick="toggleDarkMode()" class="flex items-center gap-1 hover:text-inclusion-blue dark:hover:text-blue-400" aria-label="Cambiar modo oscuro/claro">
          <span id="theme-icon">🌙</span> <span class="hidden sm:inline">Tema</span>
      </button>
      <button onclick="changeFontSize(1)" class="hover:text-inclusion-blue dark:hover:text-blue-400 font-bold px-2" aria-label="Aumentar tamaño texto">A+</button>
      <button onclick="changeFontSize(-1)" class="hover:text-inclusion-blue dark:hover:text-blue-400 font-bold px-2" aria-label="Disminuir tamaño texto">A-</button>
      <button onclick="toggleDyslexia()" class="hover:text-inclusion-blue dark:hover:text-blue-400" aria-label="Fuente para dislexia">Dislexia</button>
      <button onclick="toggleContrast()" class="hover:text-inclusion-blue dark:hover:text-blue-400 font-bold" aria-label="Alto Contraste">Contraste</button>
  </div>
